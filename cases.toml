# 테스트 케이스 메니페스트 (generate_sample.py / make_montage.py 가 읽음)
# 각 [[case]] = 한 작업. id 는 outputs/<id>/ 폴더 이름이 되므로 파일시스템 안전 문자만, 중복 금지.
#   type   = "edit" (입력 이미지 필요) | "generate" (텍스트만)
#   image  = 입력 이미지 경로(루트 기준). edit 필수 / generate 생략
#   models = 돌릴 모델 ID 목록(생략 시 기본 3종 전부). 비용 줄이려면 일부만.

[[case]]
id = "cat-fullbody"
type = "edit"
image = "test_data/cat-scratch.png"
prompt = "A full-body cute cat based on this simple smiling cat sketch. High-resolution."

# 두 번째 케이스 — 얼굴을 가린 책 제거(인페인팅 성격의 편집)
[[case]]
id = "woman-book-edit"
type = "edit"
image = "test_data/woman-masking-book.jpg"
prompt = "Remove any objects covering the person's face while maintaining natural facial features"
# models = ["gemini-3.1-flash-image"]   # 주석 해제 시 이 모델만 실행(비용 절약). 생략 = 3종 전부

# 세 번째 케이스 — 텍스트→이미지 생성(generate). 입력 이미지 없이 프롬프트만.
# 간판 글자('OPEN') 렌더링 + 사실감/반사 표현으로 세 모델의 품질 차이를 보기 좋음.
[[case]]
id = "neon-cafe"
type = "generate"
prompt = "A photorealistic cozy coffee shop storefront on a rainy evening, a glowing neon sign that reads 'OPEN', wet pavement reflecting the warm light."
